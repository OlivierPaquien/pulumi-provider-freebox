# Release pipeline triggered by pushing a SemVer tag (vX.Y.Z).
#
# Required GitHub configuration (Settings → Environments):
#   - npm   : trusted publishing (OIDC) or NPM_TOKEN
#   - pypi  : PyPI trusted publisher for this workflow
#   - nuget : NUGET_USER repository secret (OIDC login)
#
# Before tagging, align main.go `version` with the release (or rely on -ldflags below).

name: Release

on:
  push:
    tags:
      - "v*"

env:
  PROVIDER: pulumi-resource-freebox
  GO_VERSION: "1.24"

jobs:
  build-provider:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build provider binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          mkdir -p dist/
          go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${{ env.PROVIDER }}${EXT}" \
            .
          tar czf "${{ env.PROVIDER }}-v${VERSION}-${GOOS}-${GOARCH}.tar.gz" -C dist/ "${{ env.PROVIDER }}${EXT}"
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: provider-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.PROVIDER }}-*.tar.gz

  generate-sdks:
    needs: build-provider
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: pulumi/actions@v6

      - name: Download linux-amd64 provider
        uses: actions/download-artifact@v4
        with:
          name: provider-linux-amd64
          path: bin/

      - name: Generate schema and SDKs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar xzf bin/*.tar.gz -C bin/
          rm -f bin/*.tar.gz
          chmod +x bin/${{ env.PROVIDER }}
          pulumi package get-schema ./bin/${{ env.PROVIDER }} \
            | jq -f scripts/patch-schema.jq \
            > schema.json
          pulumi package gen-sdk schema.json --language python --version "$VERSION"
          pulumi package gen-sdk schema.json --language go --version "$VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: schema
          path: schema.json

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-python
          path: sdk/python/

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-go
          path: sdk/go/

  github-release:
    needs: build-provider
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true

  publish-python:
    needs: generate-sdks
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-python
          path: sdk/python/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          cd sdk/python
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  publish-go:
    needs: generate-sdks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sdk-go
          path: sdk/go/

      - id: version
        name: Resolve version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Publish Go SDK tag
        uses: pulumi/publish-go-sdk-action@v1
        with:
          repository: OlivierPaquien/pulumi-provider-freebox
          base-ref: ${{ github.ref_name }}
          source: sdk/go
          path: sdk/go
          version: ${{ steps.version.outputs.version }}
          additive: "true"