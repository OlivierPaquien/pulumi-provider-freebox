name: Build

on:
  push:
    branches:
      - main
  pull_request:

env:
  GO_VERSION: "1.24"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run unit tests
        run: go test -v -run TestProvider_ ./...

      - name: Build provider
        run: go build -o bin/pulumi-resource-freebox .

      - name: Validate schema generation
        uses: pulumi/actions@v6

      - name: Generate schema from binary
        run: |
          chmod +x bin/pulumi-resource-freebox scripts/version.sh
          VERSION="$(./scripts/version.sh read)"
          pulumi package get-schema ./bin/pulumi-resource-freebox \
            | jq --arg version "$VERSION" -f scripts/patch-schema.jq \
            | jq -e '.name == "freebox" and .pluginDownloadURL != null and .version == "'"$VERSION"'"' >/dev/null
