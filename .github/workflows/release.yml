# Release pipeline triggered by pushing a SemVer tag (vX.Y.Z).
#
# Required GitHub configuration (Settings → Environments):
#   - npm   : trusted publishing (OIDC) or NPM_TOKEN
#   - pypi  : PyPI trusted publisher for this workflow
#   - nuget : NUGET_USER repository secret (OIDC login)
#
# After tagging main, this workflow syncs schema.json and main.go version onto main
# and updates the release tag so the registry can fetch schema.json at vX.Y.Z.

name: Release

on:
  push:
    tags:
      - "v*"

env:
  PROVIDER: pulumi-resource-freebox
  GO_VERSION: "1.24"

jobs:
  build-provider:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build provider binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          mkdir -p dist/
          go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${{ env.PROVIDER }}${EXT}" \
            .
          tar czf "${{ env.PROVIDER }}-v${VERSION}-${GOOS}-${GOARCH}.tar.gz" -C dist/ "${{ env.PROVIDER }}${EXT}"
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: provider-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.PROVIDER }}-*.tar.gz

  generate-sdks:
    needs: build-provider
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: pulumi/actions@v6

      - name: Download linux-amd64 provider
        uses: actions/download-artifact@v4
        with:
          name: provider-linux-amd64
          path: bin/

      - name: Generate schema and SDKs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar xzf bin/*.tar.gz -C bin/
          rm -f bin/*.tar.gz
          chmod +x bin/${{ env.PROVIDER }}
          pulumi package get-schema ./bin/${{ env.PROVIDER }} \
            | jq --arg version "$VERSION" -f scripts/patch-schema.jq \
            > schema.json
          pulumi package gen-sdk schema.json --language python --version "$VERSION"
          pulumi package gen-sdk schema.json --language go --version "$VERSION"
          pulumi package gen-sdk schema.json --language nodejs --version "$VERSION"
          pulumi package gen-sdk schema.json --language dotnet --version "$VERSION"

          # Make sdk/go a standalone Go module so `go get .../sdk/go@...` works.
          printf '%s\n' \
            'module github.com/OlivierPaquien/pulumi-freebox/sdk/go' \
            '' \
            'go 1.24' \
            '' \
            'require github.com/pulumi/pulumi/sdk/v3 v3.217.0' \
            > sdk/go/go.mod
          (cd sdk/go && go mod tidy)

      - uses: actions/upload-artifact@v4
        with:
          name: schema
          path: schema.json

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-python
          path: sdk/python/

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-go
          path: sdk/go/

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-nodejs
          path: sdk/nodejs/

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-dotnet
          path: sdk/dotnet/

  sync-release-metadata:
    needs: generate-sdks
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: schema
          path: .

      - name: Sync schema.json and main.go version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          chmod +x scripts/version.sh
          ./scripts/version.sh write "$VERSION"

      - name: Commit and update release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add schema.json main.go
          if git diff --staged --quiet; then
            echo "schema.json and main.go already up to date"
            exit 0
          fi
          git commit -m "chore(release): sync schema.json and version for ${GITHUB_REF_NAME}"
          git tag -fa "${GITHUB_REF_NAME}" -m "Release ${GITHUB_REF_NAME}"
          git push origin HEAD:refs/heads/main
          git push origin "${GITHUB_REF_NAME}" --force

  github-release:
    needs: [build-provider, generate-sdks]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: schema
          path: release-assets/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            release-assets/schema.json
          generate_release_notes: true

  publish-python:
    needs: generate-sdks
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-python
          path: sdk/python/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          cd sdk/python
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  publish-npm:
    needs: generate-sdks
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-nodejs
          path: sdk/nodejs/

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: |
          cd sdk/nodejs
          npm pkg delete repository 2>/dev/null || true
          npm pkg set repository.type=git repository.url=https://github.com/OlivierPaquien/pulumi-freebox
          npm install
          npm publish --provenance --access public

  publish-nuget:
    needs: generate-sdks
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdk-dotnet
          path: sdk/dotnet/

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build NuGet package
        run: |
          cd sdk/dotnet
          dotnet build --configuration Release
          dotnet pack --configuration Release --no-build --output nupkgs

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        run: |
          dotnet nuget push sdk/dotnet/nupkgs/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json

  publish-go:
    needs: [generate-sdks, sync-release-metadata]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sdk-go
          path: sdk/go/

      - id: version
        name: Resolve version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Publish Go SDK tag
        uses: pulumi/publish-go-sdk-action@v1
        with:
          repository: OlivierPaquien/pulumi-freebox
          base-ref: ${{ github.ref_name }}
          source: sdk/go
          path: sdk/go
          version: ${{ steps.version.outputs.version }}
          additive: "false"
